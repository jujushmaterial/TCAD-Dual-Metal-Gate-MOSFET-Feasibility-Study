<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="430" viewBox="0 0 1000 430" role="img" aria-label="single versus dual gate"><defs><style>text{font-family:Arial,'Noto Sans KR',sans-serif;fill:#1f2328}.title{font-size:28px;font-weight:700}.h{font-size:20px;font-weight:700}.t{font-size:16px}.s{font-size:14px;fill:#57606a}.box{fill:#f6f8fa;stroke:#8c959f;stroke-width:2}</style></defs><text x="500" y="42" text-anchor="middle" class="title">Single-Metal vs Dual-Metal Gate</text><rect x="70" y="90" width="390" height="285" rx="15" class="box"/><rect x="540" y="90" width="390" height="285" rx="15" class="box"/><text x="265" y="130" text-anchor="middle" class="h">Single-Metal Gate</text><text x="735" y="130" text-anchor="middle" class="h">Dual-Metal Gate</text><rect x="150" y="190" width="230" height="65" fill="#a5b4fc" stroke="#4338ca" stroke-width="3"/><text x="265" y="230" text-anchor="middle" class="h">One WF</text><rect x="610" y="190" width="125" height="65" fill="#ffb000" stroke="#7a4e00" stroke-width="3"/><rect x="735" y="190" width="125" height="65" fill="#00a6e8" stroke="#0550ae" stroke-width="3"/><text x="672" y="230" text-anchor="middle" class="h">Low WF</text><text x="797" y="230" text-anchor="middle" class="h">High WF</text><text x="265" y="300" text-anchor="middle" class="t">Injection과 field suppression을</text><text x="265" y="326" text-anchor="middle" class="t">하나의 값으로 동시에 조절</text><text x="735" y="300" text-anchor="middle" class="t">Source와 Drain 역할을</text><text x="735" y="326" text-anchor="middle" class="t">lateral direction으로 분리</text></svg>