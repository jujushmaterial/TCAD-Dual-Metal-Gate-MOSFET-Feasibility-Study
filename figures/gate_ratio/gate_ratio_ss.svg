<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"><rect width="100%" height="100%" fill="white"/><text x="450" y="32" text-anchor="middle" font-family="Arial" font-size="24" font-weight="700">Gate Ratio vs SS</text><line x1="90" y1="65" x2="90" y2="410" stroke="#24292f"/><line x1="90" y1="410" x2="865" y2="410" stroke="#24292f"/><text x="90" y="436" text-anchor="middle" font-family="Arial" font-size="14">6:4</text><text x="348" y="436" text-anchor="middle" font-family="Arial" font-size="14">5:5</text><text x="607" y="436" text-anchor="middle" font-family="Arial" font-size="14">4.5:5.5</text><text x="865" y="436" text-anchor="middle" font-family="Arial" font-size="14">3.5:6.5</text><polyline points="90,180 348,225 607,245 865,270" fill="none" stroke="#2f81f7" stroke-width="4"/><circle cx="90" cy="180" r="6" fill="#2f81f7"/><circle cx="348" cy="225" r="6" fill="#2f81f7"/><circle cx="607" cy="245" r="6" fill="#2f81f7"/><circle cx="865" cy="270" r="6" fill="#2f81f7"/><text x="22" y="238" transform="rotate(-90 22 238)" text-anchor="middle" font-family="Arial" font-size="16">SS (mV/dec)</text><text x="450" y="478" text-anchor="middle" font-family="Arial" font-size="13" fill="#57606a">Lower SS is better; a modest improvement appears with a larger GateD ratio.</text></svg>