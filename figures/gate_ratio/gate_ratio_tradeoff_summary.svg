<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="430" viewBox="0 0 1100 430" role="img" aria-label="gate ratio trade-off"><defs><style>text{font-family:Arial,'Noto Sans KR',sans-serif;fill:#1f2328}.title{font-size:28px;font-weight:700}.h{font-size:20px;font-weight:700}.t{font-size:16px}.s{font-size:14px;fill:#57606a}</style></defs><text x="550" y="45" text-anchor="middle" class="title">Gate-Ratio Trade-off Summary</text><rect x="65" y="105" width="270" height="230" rx="16" fill="#fff7ed" stroke="#d97706" stroke-width="3"/><rect x="415" y="105" width="270" height="230" rx="16" fill="#f6f8fa" stroke="#8c959f" stroke-width="3"/><rect x="765" y="105" width="270" height="230" rx="16" fill="#eff6ff" stroke="#0969da" stroke-width="3"/><text x="200" y="150" text-anchor="middle" class="h">6:4</text><text x="200" y="200" text-anchor="middle" class="t">Highest Ion</text><text x="200" y="235" text-anchor="middle" class="t">Higher Ioff / Ig</text><text x="200" y="285" text-anchor="middle" class="s">Source injection priority</text><text x="550" y="150" text-anchor="middle" class="h">5:5</text><text x="550" y="200" text-anchor="middle" class="t">Balanced reference</text><text x="550" y="235" text-anchor="middle" class="t">Ion nearly retained</text><text x="550" y="285" text-anchor="middle" class="s">Not an absolute optimum</text><text x="900" y="150" text-anchor="middle" class="h">3.5:6.5</text><text x="900" y="200" text-anchor="middle" class="t">Lowest Ioff / Ig</text><text x="900" y="235" text-anchor="middle" class="t">Lower Ion, DIBL worsens</text><text x="900" y="285" text-anchor="middle" class="s">Drain suppression priority</text><text x="550" y="390" text-anchor="middle" class="h">Ratio is a role-distribution knob, not a single-number optimum</text></svg>