<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="430" viewBox="0 0 1100 430" role="img" aria-label="research questions"><defs><style>text{font-family:Arial,'Noto Sans KR',sans-serif;fill:#1f2328}.title{font-size:28px;font-weight:700}.h{font-size:20px;font-weight:700}.t{font-size:16px}.s{font-size:14px;fill:#57606a}</style></defs><text x="550" y="45" text-anchor="middle" class="title">Three Research Questions</text><rect x="40" y="95" width="320" height="270" rx="18" fill="#fff7ed" stroke="#d97706" stroke-width="3"/><rect x="390" y="95" width="320" height="270" rx="18" fill="#eff6ff" stroke="#0969da" stroke-width="3"/><rect x="740" y="95" width="320" height="270" rx="18" fill="#f0fdf4" stroke="#1a7f37" stroke-width="3"/><text x="200" y="145" text-anchor="middle" class="h">Q1. Work-Function Split</text><text x="200" y="195" text-anchor="middle" class="t">DMG가 DIBL과 Ioff를</text><text x="200" y="225" text-anchor="middle" class="t">줄이는 방향을 보이는가?</text><text x="550" y="145" text-anchor="middle" class="h">Q2. Gate Leakage</text><text x="550" y="195" text-anchor="middle" class="t">Thin SiO₂에서의 Ig를</text><text x="550" y="225" text-anchor="middle" class="t">High-K로 완화할 수 있는가?</text><text x="900" y="145" text-anchor="middle" class="h">Q3. Gate Ratio</text><text x="900" y="195" text-anchor="middle" class="t">GateS/GateD 길이가</text><text x="900" y="225" text-anchor="middle" class="t">어떤 trade-off를 만드는가?</text><text x="200" y="315" text-anchor="middle" class="s">Lg 0.25 / 0.10 / 0.028 µm</text><text x="550" y="315" text-anchor="middle" class="s">EOT 1.6 nm 유지</text><text x="900" y="315" text-anchor="middle" class="s">6:4 → 3.5:6.5</text></svg>