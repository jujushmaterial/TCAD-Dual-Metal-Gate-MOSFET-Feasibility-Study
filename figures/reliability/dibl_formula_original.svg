<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="350" viewBox="0 0 1000 350" role="img" aria-label="DIBL formula"><defs><style>text{font-family:Arial,'Noto Sans KR',sans-serif;fill:#1f2328}.title{font-size:28px;font-weight:700}.h{font-size:20px;font-weight:700}.s{font-size:14px;fill:#57606a}</style></defs><text x="500" y="55" text-anchor="middle" class="title">DIBL Evaluation</text><rect x="120" y="105" width="760" height="95" rx="16" fill="#eff6ff" stroke="#0969da" stroke-width="3"/><text x="500" y="165" text-anchor="middle" style="font-family:serif;font-size:27px">DIBL = |Vth,LowVd − Vth,HighVd| / |Vd,High − Vd,Low|</text><text x="500" y="255" text-anchor="middle" class="h">Threshold definition determines the reliability of the extracted value</text><text x="500" y="295" text-anchor="middle" class="s">Vtgm raw → Vd/2 corrected Vtgm → constant-current Vth</text></svg>